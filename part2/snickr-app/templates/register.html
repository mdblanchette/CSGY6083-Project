{% extends "layout.html" %} {% block title %}Register - Snickr{% endblock %} {%
block content %}
<div class="bg-white p-8 rounded shadow max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">Create an Account</h1>
    <form method="POST" action="/register" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
                >Email</label
            >
            <input
                type="email"
                name="email"
                required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
                >Username</label
            >
            <input
                type="text"
                name="username"
                required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
                >Nickname (optional)</label
            >
            <input
                type="text"
                name="nickname"
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
                >Password</label
            >
            <input
                type="password"
                name="password"
                required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
                >Confirm Password</label
            >
            <input
                type="password"
                name="confirm"
                required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
        </div>
        <button
            type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 transition"
        >
            Register
        </button>
    </form>
    <p class="mt-4 text-sm text-gray-600 text-center">
        Already have an account?
        <a href="/login" class="text-indigo-600 underline">Login</a>
    </p>
</div>
{% endblock %}
